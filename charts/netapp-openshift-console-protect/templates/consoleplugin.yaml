apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: {{ .Values.plugin.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-openshift-console-protect.labels" . | nindent 4 }}
spec:
  displayName: 'netapp-openshift-console-protect'
  backend:
    type: Service
    service:
      name: {{ template "netapp-openshift-console-protect.name" . }}
      namespace: {{ .Release.Namespace }}
      port: 9443
      basePath: '/'
  extensions:
    - type: console.catalog/item-type
      properties:
        type: netapp
        title: "Netapp Openshift Console for Trident Protect"
        catalogDescription: "NetApp OpenShift Console Plugin provides a single pane integration with NetApp Intelligent Data Management solutions for containers and virtual machines."
        filters:
          tags:
            - netapp
            - storage
            - trident
            - patterns  